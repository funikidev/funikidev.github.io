<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>funiki — pack</title>
<meta name="description" content="Download a funiki persona pack.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫧</text></svg>">
<style>
:root {
  --bg: #0a0a0b; --bg2: #111114; --bg3: #1a1a1f; --border: #2a2a30;
  --text: #e8e8f0; --muted: #888899; --accent: #7c6fff;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --mono: 'JetBrains Mono','Fira Code',ui-monospace,monospace;
}
@media (prefers-color-scheme: light) {
  :root { --bg:#fafafa;--bg2:#f4f4f6;--bg3:#ebebef;--border:#d4d4dc;--text:#1a1a2e;--muted:#6b6b80; }
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px 36px;
  max-width: 460px;
  width: 100%;
  text-align: center;
}
.icon { font-size: 48px; margin-bottom: 20px; }
h1 { font-size: 1.9rem; font-weight: 700; margin-bottom: 10px; }
.persona {
  color: var(--muted);
  font-size: 0.9rem;
  line-height: 1.6;
  margin-bottom: 28px;
}
.file-chip {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 14px;
  font-family: var(--mono);
  font-size: 0.82rem;
  color: var(--muted);
  margin-bottom: 28px;
}
.dl-btn {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  font-size: 1rem;
  font-weight: 600;
  padding: 14px 36px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  transition: opacity .15s;
  width: 100%;
}
.dl-btn:hover { opacity: .85; }
.footer {
  margin-top: 28px;
  color: var(--muted);
  font-size: 0.8rem;
}
.footer a { color: var(--muted); text-decoration: underline; }
.error { color: #f87171; font-size: 0.9rem; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🫧</div>
  <div id="content"><p style="color:var(--muted)">Loading…</p></div>
</div>

<script>
(function () {
  var params = new URLSearchParams(location.search);
  var raw = params.get('pack');

  if (!raw) {
    document.getElementById('content').innerHTML =
      '<p class="error">No pack data found in URL.</p>' +
      '<p class="footer" style="margin-top:16px"><a href="/">← funiki</a></p>';
    return;
  }

  var pack;
  try {
    var b64 = raw.replace(/-/g, '+').replace(/_/g, '/');
    var rem = b64.length % 4;
    if (rem) b64 += '===='.slice(rem);
    pack = JSON.parse(atob(b64));
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<p class="error">Could not decode pack data.</p>';
    return;
  }

  var name = pack.name || 'pack';
  var filename = name.replace(/[\/\\:*?"<>|]/g, '-') + '.funiki.json';
  var json = JSON.stringify(pack, null, 2);

  var personaText = '';
  if (typeof pack.persona === 'string') {
    personaText = pack.persona.length > 140
      ? pack.persona.slice(0, 140) + '…'
      : pack.persona;
  } else if (pack.persona) {
    var parts = [pack.persona.tone, pack.persona.style].filter(Boolean);
    personaText = parts.join(' · ');
  }

  document.title = name + ' — funiki';
  document.getElementById('content').innerHTML =
    '<h1>' + esc(name) + '</h1>' +
    (personaText ? '<p class="persona">' + esc(personaText) + '</p>' : '') +
    '<div class="file-chip">📄 ' + esc(filename) + '</div>' +
    '<button class="dl-btn" onclick="dl()">Download ' + esc(filename) + '</button>' +
    '<p class="footer">powered by <a href="/">funiki</a></p>';

  window.dl = function () {
    var blob = new Blob([json], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
  };

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
})();
</script>
</body>
</html>
